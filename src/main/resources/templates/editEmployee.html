<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Employee</title>
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/addEmployee.css}">
</head>
<body>

	<div class="container">

		<h2>Edit Employee</h2>

		<form th:action="@{/employees/update}" th:object="${employee}"
			method="post">

			<input type="hidden" th:field="*{id}">

			<div class="form-group">
				<label>Name</label> <input type="text" th:field="*{name}" required>
			</div>

			<div class="form-group">
				<label>Email</label> <input type="email" th:field="*{email}"
					required>
			</div>
			<div class="form-group">
				<label>Password</label> <input type="text" th:field="*{password}"
					required>
			</div>
			<div class="form-group">
				<label>Role</label> <select th:field="*{role}">
					<option value="ADMIN">Admin</option>
					<option value="USER">User</option>
				</select>
			</div>

			<div class="buttons">
				<a th:href="@{/employees}" class="btn btn-back"> Back </a>

				<button type="submit" class="btn btn-update">Update</button>
			</div>

		</form>

	</div>

</body>
</html>
