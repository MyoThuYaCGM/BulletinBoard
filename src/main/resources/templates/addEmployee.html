<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/addEmployee.css}">
</head>
<body>

	<div class="container">

		<h2>Add Employee</h2>
		<p th:if="${error}" th:text="${error}" class="error" ></p>
		<form th:action="@{/employees/save}" th:object="${employee}"
			method="post">

			<div class="form-group">
				<label>Name</label> <input type="text" th:field="*{name}" required>
			</div>

			<div class="form-group">
				<label>Email</label> <input type="email" th:field="*{email}"
					required>
			</div>
			<div class="form-group">
				<label>Password</label> <input type="password"
					th:field="*{password}" required>
			</div>

			<div class="buttons">
				<a th:href="@{/employees}" class="btn btn-back"> Back </a>

				<button type="submit" class="btn btn-save">Save</button>
			</div>

		</form>

	</div>

</body>
</html>
