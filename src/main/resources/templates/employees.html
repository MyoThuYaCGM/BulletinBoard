<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employees</title>
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/employees.css}">
</head>
<body>

	<div class="container">

		<div class="top-bar">
			<h2>Employee List</h2>

			<a th:href="@{/employees/add}" class="btn btn-add"> + Add
				Employee </a>
		</div>

		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>Email</th>
					<th>Password</th>
					<th width="180">Actions</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="emp : ${employees}">
					<td th:text="${emp.id}"></td>
					<td th:text="${emp.name}"></td>
					<td th:text="${emp.email}"></td>
					<td th:text="${emp.password}"></td>
					<td><a th:href="@{/employees/edit/{id}(id=${emp.id})}"
						class="action-btn edit-btn"> Edit </a> <a
						th:href="@{/employees/delete/{id}(id=${emp.id})}"
						class="action-btn delete-btn"
						onclick="return confirm('Delete this employee?')"> Delete </a></td>
				</tr>
			</tbody>
		</table>
		<div class="bot-bar">
			<a th:href="@{/logout}" class="btn btn-logout"> Logout </a>
		</div>



	</div>

</body>
</html>
