<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login Form</title>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

	<div class="container">

		<h2>Login</h2>
		<p th:if="${error}" th:text="${error}" class="error"></p>
		<form th:action="@{/login}" th:object="${loginRequest}" method="post">

			<div class="form-group">
				<label>Email</label> <input type="email" th:field="*{email}" required>
			</div>

			<div class="form-group">
				<label>Password</label> <input type="password" th:field="*{password}" required>
			</div>

			<button type="submit" class="btn btn-login">Login</button>

		</form>

		<div class="links">
			<a th:href="@{/forgot-password}"> Forgot Password? </a>
		</div>

	</div>

</body>
</html>
