<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Change Password</title>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/change-password.css}">
</head>
<body>

	<div class="container">

		<h2>Change Password</h2>

		<p class="description">Please enter your new password.</p>

		<p th:if="${error}" th:text="${error}" class="error"></p>
		<p th:if="${success}" th:text="${success}" class="success"></p>
		<form th:action="@{/change-password}" method="post">

			<input type="hidden" name="email" th:value="${email}">

			<div class="form-group">
				<label>New Password</label> <input type="password"
					name="newPassword" placeholder="Enter new password" required>
			</div>

			<div class="form-group">
				<label>Confirm New Password</label> <input type="password"
					name="confirmPassword" placeholder="Confirm new password" required>
			</div>

			<button type="submit" class="btn btn-change">Change Password
			</button>

		</form>

		<div class="links">
			<a th:href="@{/login}"> Back to Login </a>
		</div>

	</div>

</body>
</html>
